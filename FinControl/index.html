<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinControl - Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="wrapper">

    <section class="hero">
        <div class="logo">Fin<span>Control</span></div>

        <p>
            Gerencie receitas, despesas, metas e relatórios
            em um ambiente moderno, seguro e intuitivo.
        </p>

        <div class="stats">
            <div class="stat">✔ Controle financeiro centralizado</div>
            <div class="stat">✔ Dashboard inteligente</div>
            <div class="stat">✔ Planejamento por metas</div>
        </div>
    </section>

    <section class="form-area">

        <h2>Entrar</h2>
        <div class="subtitle">Acesse sua conta para continuar</div>

        <form id="loginForm">

            <label for="email">E-mail</label>
            <input type="email" id="email" required>

            <label for="senha">Senha</label>
            <input type="password" id="senha" required>

            <button type="submit">Entrar</button>

            <div class="msg" id="msg"></div>

        </form>

        <div class="footer">
            Não possui conta?
            <a href="cadastro.html">Criar cadastro</a>
        </div>

    </section>

</div>

<script src="script.js"></script>
</body>
</html>
